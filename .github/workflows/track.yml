name: 豆瓣楼主发言追踪

on:
  schedule:
    - cron: '30 8 * * *'         # 北京时间 16:30（UTC+8 = UTC 08:30，每天含周末）
  workflow_dispatch:            # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 抓取并分析
        env:
          DOUBAN_COOKIE: ${{ secrets.DOUBAN_COOKIE }}
          DOUBAN_GROUP_URLS: ${{ secrets.DOUBAN_GROUP_URLS }}
          DOUBAN_TARGET_USER: ${{ secrets.DOUBAN_TARGET_USER }}
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
        run: python tracker.py

      - name: 校验 latest.json 结构完整性
        run: |
          python3 - <<'PY'
          import json, sys
          d = json.load(open('data/latest.json', encoding='utf-8'))
          # ① 顶层 6 板块键
          required = ["fetched_at","today_count","overview","positions",
                      "investor_profile","nickname_map"]
          missing = [k for k in required if k not in d]
          # ② overview 6 子板块键
          ov = d.get("overview", {}) or {}
          ov_keys = {"market_background","core_views","today_actions",
                     "position_dynamics","favored_sectors","risk_warnings"}
          ov_missing = ov_keys - set(ov.keys())
          if missing or ov_missing:
              print("❌ latest.json 结构不完整，已拦截推送以防看板空白：")
              if missing:    print("  缺失顶层键:", missing)
              if ov_missing: print("  缺失 overview 子键:", sorted(ov_missing))
              sys.exit(1)
          print("✅ latest.json 6 板块结构校验通过（顶层 + overview 子板块齐全）")
          PY

      - name: 校验自动回写文件合法性
        run: |
          python3 - <<'PY'
          import json, sys
          # state.json 回写后必须仍是合法结构
          st = json.load(open('state.json', encoding='utf-8'))
          pos = st.get('positions', {}).get('positions', [])
          if not isinstance(pos, list):
              print("❌ state.json.positions 非列表，拦截推送"); sys.exit(1)
          if len(pos) == 0:
              print("❌ 持仓被清空，疑似自动回写异常，拦截推送"); sys.exit(1)
          # investor_profile.json 回写后仍含 7 维度
          prof = json.load(open('investor_profile.json', encoding='utf-8'))
          dims = prof.get('profile', {})
          if len(dims) < 5:
              print("❌ 投资风格画像维度异常(<5)，拦截推送"); sys.exit(1)
          print(f"✅ 自动回写校验通过：持仓 {len(pos)} 项 / 画像 {len(dims)} 维度")
          PY

      - name: 提交数据回仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data reports state.json investor_profile.json
          git diff --cached --quiet || git commit -m "chore: 每日追踪更新 $(date +%F)"
          git push

      - name: 打包站点产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: .                     # 发布整个仓库：含 docs/(看板) 与 data/(latest.json)
          retention-days: 1

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
