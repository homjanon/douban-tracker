<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>豆瓣楼主每日发言推送</title>
<style>
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
         max-width: 880px; margin: 0 auto; padding: 24px; background: #fafafa; color: #222; }
  h1 { font-size: 22px; border-bottom: 2px solid #07c160; padding-bottom: 8px; }
  h2 { font-size: 17px; margin: 24px 0 10px; color: #07c160; }
  h3 { font-size: 15px; margin: 14px 0 6px; color: #333; }
  .meta { color: #888; font-size: 13px; margin: 8px 0 16px; line-height: 1.6; }
  .card { background: #fff; border-radius: 8px; padding: 16px; margin: 14px 0;
          box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .tag { display: inline-block; background: #07c160; color: #fff; font-size: 12px;
         padding: 1px 8px; border-radius: 10px; margin-left: 6px; }
  .warn { background: #fff7e6; border-left: 4px solid #faad14; padding: 8px 12px;
          border-radius: 4px; font-size: 13px; line-height: 1.6; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 8px; }
  th, td { border: 1px solid #eee; padding: 6px 8px; text-align: left; vertical-align: top; }
  th { background: #f6ffed; }
  pre { white-space: pre-wrap; word-break: break-word; font-size: 13px; line-height: 1.6;
        background: #fafafa; padding: 10px; border-radius: 4px; }
  .post { border-top: 1px solid #eee; padding: 10px 0; line-height: 1.5; }
  .post .t { color: #999; font-size: 12px; }
  .empty { color: #999; font-style: italic; }
  .fallback { background: #fff7e6; border-left: 4px solid #faad14; padding: 8px 12px; border-radius: 4px; }
  .toolbar { margin: 0 0 14px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .toolbar button { background: #07c160; color: #fff; border: none; border-radius: 6px;
                    padding: 8px 14px; font-size: 14px; cursor: pointer; }
  .toolbar button:hover { background: #06ad56; }
  .toolbar .hint { color: #999; font-size: 12px; }
</style>
</head>
<body>
<h1>📋 楼主每日发言推送</h1>
<div class="toolbar">
  <button onclick="window.open('https://github.com/homjanon/douban-tracker/actions/workflows/track.yml','_blank')">
    🔄 手动触发更新
  </button>
  <span class="hint">点击后在 GitHub 页面点「Run workflow」即可立即运行（零密钥、安全）</span>
</div>
<div class="meta" id="meta">加载中…</div>
<div id="content">读取 data/latest.json 中…</div>

<script>
fetch('../data/latest.json')
  .then(r => r.json())
  .then(render)
  .catch(e => document.getElementById('content').innerHTML =
    '<div class="empty">加载失败：' + e + '（请确认 Actions 已运行且 data/latest.json 已生成）</div>');

function render(d) {
  const u = d.user || {};
  document.getElementById('meta').innerHTML =
    '更新时间：' + (d.fetched_at || '?') + ' ｜ 监控用户：<code>' + esc(u.name || '?') + '</code>'
    + ' ｜ 当日新增：' + (d.today_count ?? 0) + ' 条 ｜ 累计存档：' + (d.total_archived ?? 0) + ' 条';

  let h = '';
  if (d.showing_fallback) h += '<div class="fallback">⚠️ 本次无新增发言，以下为近期发言兜底展示。</div>';

  // ① 持仓追踪（5列：标的/状态/类型/现价/提及）
  if (d.positions && d.positions.positions) {
    h += '<h2>📊 持仓追踪</h2><div class="card">' + table([
      ['标的','状态','类型','现价','提及'],
      ...d.positions.positions.map(p => [
        p.name, p.action, p.category,
        priceCell(p.current_price||'暂无'),
        mentionCell(p.first_seen, p.last_note, p.cost_price)
      ])
    ]) + '</div>';
  }

  // ② 今日总览
  const ov = d.overview || {};
  if (Object.values(ov).some(v => v)) {
    h += '<h2>🌅 今日总览</h2><div class="card">';
    const secs = [['market_background','📌 市场背景'],['core_views','📌 楼主核心观点'],
                  ['today_actions','📌 今日操作'],['position_dynamics','📌 持仓动态'],
                  ['favored_sectors','📌 看好板块/方向'],['risk_warnings','📌 风险提示']];
    secs.forEach(([k, t]) => {
      if (ov[k]) {
        h += '<h3>'+t+'</h3>';
        // 含 Markdown 表格则渲染成 <table>，否则原样 <pre>
        h += isMdTable(ov[k]) ? mdTable(ov[k]) : '<pre>'+esc(ov[k])+'</pre>';
      }
    });
    h += '</div>';
  }

  // ④ 发言聚合 / 原始发言
  const posts = d.posts || [];
  h += '<h2>📝 发言（' + posts.length + ' 条）</h2><div class="card">';
  if (!posts.length) h += '<div class="empty">今日无发言</div>';
  posts.forEach(p => {
    h += '<div class="post"><span class="t">' + esc(p.time || '') + '</span><br>'
       + esc(p.content || '').replace(/\n/g, '<br>')
       + (p.quote ? '<br><span class="t">⊳ ' + esc(p.quote) + '</span>' : '') + '</div>';
  });
  h += '</div>';

  // ⑤ 投资风格分析
  if (d.investor_profile) {
    h += '<h2>🧠 投资风格分析</h2><div class="card"><pre>' + esc(d.investor_profile) + '</pre></div>';
  }

  // ⑥ 昵称映射表（规律 + 映射）
  h += '<h2>🏷️ 昵称映射表</h2><div class="card">';
  if (d.nickname_rules) h += '<h3>📖 昵称规律（供 AI 判断新昵称时参考）</h3><pre>' + esc(d.nickname_rules) + '</pre>';
  if (d.nickname_map) {
    h += '<h3>📋 已收录映射</h3>' + table([['昵称','对应名称'],
      ...Object.entries(d.nickname_map)]);
  }
  h += '</div>';

  // 待确认建议
  if ((d.pending_positions && d.pending_positions.length) ||
      (d.pending_nicknames && Object.keys(d.pending_nicknames).length)) {
    h += '<div class="warn">⚠️ 以下为 LLM <b>建议</b>，未自动写入状态文件。请人工确认后本地编辑 state.json 并 push。</div>';
    if (d.pending_positions && d.pending_positions.length) {
      h += '<div class="card"><h3>持仓建议（待确认）</h3>';
      d.pending_positions.forEach(p => h += '<div class="post"><b>'+esc(p.name)+'</b>'
        + (p.code ? ' <span class="tag">'+esc(p.code)+'</span>' : '')
        + ' ［'+esc(p.action||'?')+'］<br><span class="t">依据：'+esc(p.evidence||'')+'</span></div>');
      h += '</div>';
    }
    if (d.pending_nicknames && Object.keys(d.pending_nicknames).length) {
      h += '<div class="card"><h3>新昵称映射建议（待确认）</h3>';
      for (const [k, v] of Object.entries(d.pending_nicknames))
        h += '<div class="post"><code>'+esc(k)+'</code> = '+esc(v)+'</div>';
      h += '</div>';
    }
  }

  document.getElementById('content').innerHTML = h;
}

function table(rows) {
  let t = '<table><thead><tr>' + rows[0].map(c => '<th>'+esc(c)+'</th>').join('') + '</tr></thead><tbody>';
  rows.slice(1).forEach(r => t += '<tr>' + r.map(c => '<td>'+esc(c)+'</td>').join('') + '</tr>');
  return t + '</tbody></table>';
}

// 现价单元格：提取涨跌幅上色（红涨绿跌）
function priceCell(s) {
  if (!s || s === '暂无') return '<td>暂无</td>';
  const m = s.match(/（([+\-]?[\d.]+)%）/);
  let cls = '';
  if (m) cls = m[1].startsWith('-') ? 'neg' : 'pos';
  return `<td class="${cls}">${esc(s)}</td>`;
}

// 提及单元格：日期 MM-DD→M.D + 当日动态 + 约xx成本
function mentionCell(first_seen, last_note, cost_price) {
  let date = '';
  if (first_seen) {
    const m = String(first_seen).match(/(\d{1,2})-(\d{1,2})/);
    date = m ? `${parseInt(m[1])}.${parseInt(m[2])}` : first_seen;
  }
  const parts = [];
  if (date) parts.push(date);
  if (last_note) parts.push(last_note);
  if (cost_price) {
    let cm = cost_price.match(/约([\d万.]+元?万?元?)/);
    if (!cm) cm = cost_price.match(/(\d+-\d+元)/);
    if (cm) parts.push('成本约' + cm[1]);
  }
  return '<td>' + esc(parts.join('；') || '暂无') + '</td>';
}

// 判断文本是否含 Markdown 表格（有表头行 + 分隔行 |---|）
function isMdTable(s) {
  if (!s || typeof s !== 'string') return false;
  const lines = s.trim().split('\n').map(l => l.trim()).filter(Boolean);
  for (let i = 0; i + 1 < lines.length; i++) {
    if (lines[i].includes('|') && /^\|[\s:|-]+\|$/.test(lines[i + 1])) return true;
  }
  return false;
}

// 把 Markdown 表格文本渲染为 <table>
function mdTable(s) {
  const lines = s.trim().split('\n').map(l => l.trim()).filter(Boolean);
  const rows = [];
  for (const line of lines) {
    if (/^\|[\s:|-]+\|$/.test(line)) continue;        // 跳过分隔行
    const cells = line.replace(/^\||\|$/g, '').split('|').map(c => c.trim());
    rows.push(cells);
  }
  if (!rows.length) return '<pre>' + esc(s) + '</pre>';
  return table(rows);
}
function esc(s) {
  return (s == null ? '' : String(s)).replace(/[&<>"]/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}
</script>
</body>
</html>
